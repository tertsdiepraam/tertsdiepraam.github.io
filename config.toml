# The URL the site will be built for
base_url = "https://terts.dev"

title = "Terts Diepraam"

description = "Personal website of Terts Diepraam"

default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

generate_feeds = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown]
highlight_code = true
highlight_theme = "css"
highlight_themes_css = [
  { theme = "OneHalfDark", filename = "syntax-theme-dark.css" },
  { theme = "OneHalfLight", filename = "syntax-theme-light.css" },
]

[extra]
# Put all your custom variables here
author = "Terts Diepraam"
show_author = false
show_categories = false
show_tags = false
